# Ryoku: audio follows the device you just connected. PipeWire's pulse server
# loads the PulseAudio compat module so a newly appeared sink (a Bluetooth
# headset finishing its connect, a plugged-in USB DAC) becomes the default and
# running streams migrate to it. Without this, sound keeps playing out of the
# old device until the user re-picks the sink in the mixer by hand. This is a
# drop-in: it merges over the stock pipewire-pulse.conf, replacing nothing.
pulse.cmd = [
    { cmd = "load-module" args = "module-switch-on-connect" }
]
