# Ryoku Bluetooth audio policy. Two goals:
#   - a headset mic on a call (the HFP/HSP profile) uses mSBC wideband speech
#     (16 kHz) instead of the ancient CVSD (8 kHz), so a Bluetooth call is as
#     clear as the profile can be. classic Bluetooth physically cannot carry
#     hi-fi output AND a mic at the same time, so a call is never A2DP quality;
#     this just makes it the best HFP allows, instead of telephone-muffled.
#   - music/media (the A2DP profile) prefers the high-quality codecs a headset
#     advertises (LDAC, AptX HD/AptX, AAC) over plain SBC, and uses SBC-XQ when
#     SBC is all a device offers, so playback is not needlessly muffled.
#
# System drop-in: WirePlumber merges this over its defaults. A user can still
# override any of it in ~/.config/wireplumber/wireplumber.conf.d/.
monitor.bluez.properties = {
  bluez5.enable-sbc-xq = true
  bluez5.enable-msbc = true
  bluez5.enable-hw-volume = true
  bluez5.codecs = [ ldac aptx_hd aptx aac sbc_xq sbc ]
  bluez5.hfphsp-backend = "native"
}
