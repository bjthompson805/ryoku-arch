# Ryoku boots from USB, Ventoy, or a raw dd write, never PXE. The stock archiso
# PXE hooks pull ipconfig/nfsmount from mkinitcpio-nfs-utils and nbd-client from
# nbd, none of which the ISO ships, so they error on every build and flag the
# initramfs "possibly incomplete". Drop them; a USB or loop boot needs only the
# archiso, archiso_loop_mnt, block, and filesystems hooks kept below.
HOOKS=(base udev microcode modconf kms memdisk archiso archiso_loop_mnt block filesystems keyboard)
COMPRESSION="xz"
COMPRESSION_OPTIONS=(-9e)
