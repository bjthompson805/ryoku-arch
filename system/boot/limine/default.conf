# Deployed to /etc/default/limine. Read by limine-mkinitcpio-hook to build
# the UKI(s) and regenerate /boot/limine/limine.conf entries.

TARGET_OS_NAME="Ryoku"

ESP_PATH="/boot"

# @@CMDLINE@@ is replaced by the installer (bootloader.sh) with the real root
# cmdline: root=/dev/mapper/root rootflags=subvol=@ rw, plus
# cryptdevice=UUID=<luks>:root when LUKS is enabled. "quiet splash" hands the
# screen to Plymouth and is always appended.
KERNEL_CMDLINE[default]+="@@CMDLINE@@"
KERNEL_CMDLINE[default]+=" quiet splash"

ENABLE_UKI=yes
CUSTOM_UKI_NAME="ryoku"

ENABLE_LIMINE_FALLBACK=yes

# Detect and chainload other installed bootloaders.
FIND_BOOTLOADERS=yes

BOOT_ORDER="*, *fallback, Snapshots"

# Btrfs snapshot entries, wired up by limine-snapper-sync.
MAX_SNAPSHOT_ENTRIES=5

SNAPSHOT_FORMAT_CHOICE=5
