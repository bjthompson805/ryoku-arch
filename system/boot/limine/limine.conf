# Ryoku Limine configuration. Global look and branding live here; the UKI
# boot entries are generated by limine-mkinitcpio-hook from default.conf
# (deployed to /etc/default/limine). Upstream directive reference:
# https://github.com/limine-bootloader/limine/blob/trunk/CONFIG.md

timeout: 3
default_entry: 1

interface_branding: Ryoku Bootloader
# On Limine 12+ interface_branding_color is a literal RRGGBB, so set Ryoku
# orange directly rather than an ANSI palette index.
interface_branding_color: F25623
interface_help_color: F25623
hash_mismatch_panic: no

term_background: 171717
backdrop: 171717

# Greek Noir palette, matches the Ryoku theme and the Plymouth splash.
term_palette: 171717;aeab94;F25623;4D4D4D;88A57D;F56E0F;8A8A8A;bcbfbc
term_palette_bright: 333333;aeab94;F25623;4D4D4D;88A57D;F56E0F;8A8A8A;757d75

term_foreground: CCD0CF
term_foreground_bright: CCD0CF
term_background_bright: 333333

# Default UKI entry. limine-mkinitcpio-hook rewrites the real entries (one
# per kernel, plus snapshots) on every update; this placeholder records the
# expected shape and keeps a bootable default if generation is skipped.
/Ryoku Linux
    protocol: efi
    path: boot():/EFI/Linux/ryoku.efi
