# Ryoku initramfs HOOKS, applied to /etc/mkinitcpio.conf during install.
#
# 'plymouth' sits right after 'udev' so the splash owns the screen as early
# as possible. 'kms' loads the GPU driver in the initramfs for flicker-free
# handoff to Plymouth and the display manager.
#
# 'encrypt' is only required on LUKS installs. The installer keeps it for an
# encrypted root and removes it otherwise, so a plain (unencrypted) system
# does not pull in the cryptsetup hook it never uses.

HOOKS=(base udev plymouth keyboard autodetect microcode modconf kms keymap consolefont block encrypt filesystems fsck)
