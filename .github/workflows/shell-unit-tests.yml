name: Shell unit tests

# Runs the pure-JS unit tests behind the Quickshell surfaces (the launcher fuzzy
# ranker and the ryoshot coords/keymap/annotation libs). They have no display or
# Quickshell dependency, so unlike the advisory qmllint job this one is a real,
# blocking gate. The runner (tests/shell-unit-tests.sh) discovers every
# ryoku/shell/**/*.test.mjs, so adding a test needs no change here.

on:
  pull_request:
    paths:
      - 'ryoku/shell/**/*.mjs'
      - 'ryoku/shell/**/*.js'
      - 'tests/shell-unit-tests.sh'
      - '.github/workflows/shell-unit-tests.yml'
  push:
    branches:
      - main
    paths:
      - 'ryoku/shell/**/*.mjs'
      - 'ryoku/shell/**/*.js'
      - 'tests/shell-unit-tests.sh'
      - '.github/workflows/shell-unit-tests.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit:
    name: shell unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run shell unit tests
        shell: bash
        run: RYOKU_PATH="$PWD" tests/shell-unit-tests.sh
