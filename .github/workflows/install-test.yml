name: Install test

# Proves an actual install of Ryoku succeeds, before a user hits a broken one.
# Two tiers: a container tier that builds the packages, installs ryoku-desktop,
# and asserts the materialized config is complete (on Arch and CachyOS bases);
# and a VM tier that boots the built ISO and runs the real installer unattended
# against a virtual disk, then verifies the installed tree. Heavy, so it never
# runs on push: it runs after a Build ISO, on a weekly schedule, and on demand.
# See installation/tests/ and docs/updates.md.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'
  workflow_run:
    workflows: ["Build ISO"]
    types: [completed]

permissions:
  contents: read
  actions: read

jobs:
  container-install:
    name: "container install (${{ matrix.base }})"
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        base: [arch, cachyos]
    container:
      image: ${{ matrix.base == 'cachyos' && 'cachyos/cachyos:latest' || 'archlinux:latest' }}
    steps:
      # git first so actions/checkout makes a real clone with history
      # (build-repo.sh derives the package version from `git rev-list`).
      - name: Install git
        run: pacman -Sy --noconfirm --needed git
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Build, install, and verify the config
        run: installation/tests/container-install.sh ${{ matrix.base }}

  vm-install:
    name: "VM install (boot the ISO)"
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Install QEMU, OVMF, and pexpect
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 qemu-utils ovmf python3-pexpect openssl
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm || true
      - name: Fetch the built ISO
        id: fetch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          rid="${{ github.event.workflow_run.id }}"
          if [ -z "$rid" ]; then
            rid=$(gh run list -w "Build ISO" --status success --limit 1 \
              --json databaseId -q '.[0].databaseId') || rid=""
          fi

          # On the weekly schedule the newest successful Build ISO can predate
          # the 14-day artifact retention window, leaving nothing to download.
          # That is not a failure: warn and skip cleanly, the same way the VM
          # step skips a runner with no /dev/kvm. A missing artifact on a
          # workflow_run or manual dispatch is still a real error.
          if [ -n "$rid" ] && gh run download "$rid" -n ryoku-iso --dir iso; then
            echo "iso_ready=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            echo "::warning::no downloadable Build ISO artifact within the 14-day retention window; skipping the scheduled install test"
            echo "iso_ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "::error::no successful Build ISO run or artifact to test"
            exit 1
          fi
      - name: Build the [ryoku] package repo for the guest
        if: steps.fetch.outputs.iso_ready == 'true'
        run: |
          set -euo pipefail
          # the guest pulls the desktop from this locally served repo instead of
          # the public one (Cloudflare 403s CI datacenter IPs). build it with the
          # Arch toolchain in a container; the qemu host itself is Ubuntu.
          docker run --rm -v "$PWD":/repo -w /repo \
            -e HOST_UID="$(id -u)" -e HOST_GID="$(id -g)" \
            archlinux:latest bash -euo pipefail -c '
              pacman -Sy --noconfirm --needed archlinux-keyring
              pacman -Su --noconfirm --needed \
                base-devel git go rust cmake ninja gnupg \
                qt6-base qt6-declarative qt6-shadertools qt6-multimedia \
                hyprland hyprcursor pango cairo pixman libdrm libinput libxkbcommon wayland wayland-protocols ffmpeg pkgconf
              git config --global --add safe.directory /repo
              installation/tests/build-ryoku-repo.sh
              chown -R "$HOST_UID:$HOST_GID" /repo
            '
      - name: Install into a VM and verify
        if: steps.fetch.outputs.iso_ready == 'true'
        run: |
          set -euo pipefail
          iso=$(ls iso/*.iso | head -1)
          if [ ! -e /dev/kvm ]; then
            echo "::warning::no /dev/kvm on this runner; skipping the VM install (needs a KVM runner)"
            exit 0
          fi
          python3 installation/tests/install-vm.py --iso "$iso" \
            --work "$RUNNER_TEMP/ryoku-vm" --repo-dir release/repo/out
      - name: Upload serial log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vm-serial-log
          path: ${{ runner.temp }}/ryoku-vm/serial.log
          if-no-files-found: ignore
