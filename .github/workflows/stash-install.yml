name: Stash installer

# The stash install action (hyprland/scripts/stash-install.sh) turns a dropped
# file into a launcher entry: an Arch package (.pkg.tar.zst) goes to pacman -U, a
# flatpak bundle to flatpak install, and .deb/.rpm payloads are extracted with
# bsdtar. The test stubs pkexec/pacman/flatpak and asserts each dispatch (and that
# a generic tarball is never escalated). See tests/stash-install.sh.

on:
  pull_request:
    paths:
      - 'ryoku/hyprland/scripts/stash-install.sh'
      - 'tests/stash-install.sh'
  push:
    branches:
      - main
    paths:
      - 'ryoku/hyprland/scripts/stash-install.sh'
      - 'tests/stash-install.sh'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  stash-install:
    name: Stash turns dropped files into launcher entries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install bsdtar (libarchive) for the .deb/.rpm payload cases
        run: sudo apt-get update && sudo apt-get install -y libarchive-tools

      - name: Stash installer dispatch
        shell: bash
        run: bash tests/stash-install.sh
